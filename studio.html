<main class="studio wrap">
  <header class="studio-top">
    <h1>The Studio</h1>
    <p class="lede">Make something with a model. Bring your own photo, gif, or video — or generate one
      with the Atelier's algorithms — then look at it together, talk about it, and reshape it, taking turns.</p>
    <div class="seg" id="studio-mode" role="group" aria-label="How to start">
      <button type="button" data-mode="generate" aria-pressed="true">Generate</button>
      <button type="button" data-mode="byo" aria-pressed="false">Bring your own</button>
    </div>
  </header>
  <div id="studio-generate"><!-- atelier controls + #studio-canvas mount (Task 7) --></div>
  <div id="studio-byo" hidden><!-- media drop + canvas (Task 8) --></div>
  <section id="studio-frame">
    <div class="frame-row">
      <section class="panel"><h2>The frame</h2><div class="stage"><canvas id="studio-canvas" width="360" height="360"></canvas></div></section>
      <section class="panel"><h2>What the model sees</h2>
        <div class="row"><span class="rk">perceptual hash</span><span class="rv" id="sc-phash">—</span></div>
        <div class="row"><span class="rk">size</span><span class="rv" id="sc-size">—</span></div>
        <div class="grounds" id="sc-feats"></div>
        <div class="mc-drift" id="sc-drift" hidden></div>
      </section>
    </div>
    <div class="chat-log" id="studio-log" role="log" aria-live="polite"></div>
    <div class="chat-chips" id="studio-chips"></div>
  </section>
</main>
