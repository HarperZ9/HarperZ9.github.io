name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  static-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install test runner
        run: python -m pip install pytest fonttools
      - name: Python content contracts
        run: python -m pytest
      - name: Internal link crawl
        run: |
          python -m http.server 8802 &
          server_pid=$!
          trap "kill $server_pid" EXIT
          sleep 2
          node tests/linkcheck.mjs
